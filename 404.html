<!DOCTYPE html>
<html>
<head>
  <script>
    var segmentCount = 1;
    var l = window.location;
    var pathParts = l.pathname.split('/');
    l.replace(
      l.protocol + '//' + l.host +
      pathParts.slice(0, 1 + segmentCount).join('/') + '/?/' +
      pathParts.slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
